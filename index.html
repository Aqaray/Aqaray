}
function generateDocNo(prefix, existingDocNos) {
  const yy = new Date().getFullYear().toString().slice(-2);
  const pattern = new RegExp(`^${prefix}-${yy}-(\\d+)$`);
  let maxSeq = 0;
  (existingDocNos || []).forEach(docNo => {
    const m = pattern.exec(docNo || "");
    if (m) maxSeq = Math.max(maxSeq, parseInt(m[1], 10));
  });
  return `${prefix}-${yy}-${String(maxSeq + 1).padStart(3, "0")}`;
}
function nextDocNo(prefix, items, dateStr, field) {
  const fieldKey = field || "docNo";
  const year = (dateStr || todayISO()).slice(2, 4);
  const yearPrefix = `${prefix}-${year}-`;
  let maxSeq = 0;
  items.forEach(it => {
    const val = it[fieldKey];
    if (val && typeof val === "string" && val.startsWith(yearPrefix)) {
      const seq = parseInt(val.slice(yearPrefix.length), 10);
      if (!isNaN(seq) && seq > maxSeq) maxSeq = seq;
    }
  });
  return `${yearPrefix}${String(maxSeq + 1).padStart(3, "0")}`;
}
function addMonthsToKey(mk, n) {
  const [y, m] = mk.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function monthKeysBetween(startDateStr, endDateStr) {
  if (!startDateStr) return [];
  const keys = [];
  const start = new Date(startDateStr);
  const end = new Date(endDateStr);
  if (end < start) return [];
  let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
  const endCursor = new Date(end.getFullYear(), end.getMonth(), 1);
  while (cursor <= endCursor) {
    keys.push(`${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, "0")}`);
    cursor.setMonth(cursor.getMonth() + 1);
  }
  return keys;
}

// Builds a debit/credit ledger for a tenant across all their contracts.
// Debits: deposit due (once per contract) + monthly rent due (each elapsed month).
// Credits: all actual payments received (any revenue linked to their contracts).
function buildContractLedger(contract, units, revenues, lang, t) {
  const today = todayISO();
  const u = units.find(x => x.id === contract.unitId);
  const unitLabel = u ? u.unitNo : "";
  const depositEntries = [];
  if (Number(contract.depositAmount) > 0) {
    depositEntries.push({
      date: contract.startDate || today,
      desc: `${t("depositDue")} — ${unitLabel}`,
      debit: Number(contract.depositAmount),
      credit: 0,
      sortKey: (contract.startDate || today) + "-a0"
    });
  }
  revenues.filter(r => r.contractId === contract.id && r.status !== "suspended" && r.category === "deposit_payment").forEach(r => {
    depositEntries.push({
      date: r.date || today,
      desc: t("depositPaid"),
      debit: 0,
      credit: Number(r.amount || 0),
      sortKey: (r.date || today) + "-b",
      doc: r
    });
  });
  const rentEntries = [];
  if (contract.startDate && Number(contract.monthlyRent) > 0) {
    const endBound = contract.status === "active" ? today : contract.endDate || today;
    const months = monthKeysBetween(contract.startDate, endBound < contract.startDate ? contract.startDate : endBound);
    months.forEach(mk => {
      rentEntries.push({
        date: `${mk}-01`,
        desc: `${t("rentDue")} — ${monthLabel(mk, lang)} — ${unitLabel}`,
        debit: Number(contract.monthlyRent),
        credit: 0,
        sortKey: `${mk}-01-a1`
      });
    });
  }
  revenues.filter(r => r.contractId === contract.id && r.status !== "suspended" && r.type === "rent").forEach(r => {
    rentEntries.push({
      date: r.date || today,
      desc: `${t("rentRevenue")} — ${monthLabel(r.month, lang)}`,
      debit: 0,
      credit: Number(r.amount || 0),
      sortKey: (r.date || today) + "-b",
      doc: r
    });
  });
  // any other non-deposit, non-rent revenue linked to this contract (e.g. damage compensation, electricity excess) also affects the general account
  revenues.filter(r => r.contractId === contract.id && r.status !== "suspended" && r.type === "other" && r.category !== "deposit_payment").forEach(r => {
    const cat = OTHER_REVENUE_CATEGORIES.find(x => x.key === r.category);
    rentEntries.push({
      date: r.date || today,
      desc: cat ? cat[lang] : t("otherRevenue"),
      debit: 0,
      credit: Number(r.amount || 0),
      sortKey: (r.date || today) + "-c",
      doc: r
    });
  });
  const withBalance = arr => {
    arr.sort((a, b) => a.sortKey.localeCompare(b.sortKey));
    let running = 0;
    return arr.map(e => {
      running += e.debit - e.credit;
      return {
        ...e,
        balance: running
      };
    });
  };
  return {
    deposit: withBalance(depositEntries),
    rent: withBalance(rentEntries)
  };
}
function buildElectricityLedger(contract, elecSettlements, lang, t) {
  const chain = computeElecChain(contract, elecSettlements);
  const entries = [];
  const opening = Number(contract.openingElecBalance || 0);
  if (opening !== 0) {
    entries.push({
      date: contract.startDate || todayISO(),
      desc: t("openingBalance"),
      debit: opening < 0 ? -opening : 0,
      credit: opening > 0 ? opening : 0,
      balance: opening
    });
  }
  chain.forEach(row => {
    const monthSaving = Number(row.limit || 0) - Number(row.billAmount || 0);
    const suspended = row.status === "suspended";
    entries.push({
      date: row.date,
      desc: `${t("electricity")} — ${monthLabel(row.month, lang)}${suspended ? ` (${t("suspended")})` : ""}`,
      debit: !suspended && monthSaving < 0 ? -monthSaving : 0,
      credit: !suspended && monthSaving > 0 ? monthSaving : 0,
      balance: row.resultingBalance,
      doc: row
    });
  });
  return entries;
}
const monthLabel = (mk, lang) => {
  if (!mk) return "";
  const [y, m] = mk.split("-");
  const names = lang === "ar" ? ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"] : ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  return `${names[parseInt(m, 10) - 1]} ${y}`;
};

function ensurePrintArea() {
  let el = document.getElementById("aqaray-print-area");
  if (!el) {
    el = document.createElement("div");
    el.id = "aqaray-print-area";
    document.body.appendChild(el);
  }
  if (!document.getElementById("aqaray-print-style")) {
    const style = document.createElement("style");
    style.id = "aqaray-print-style";
    style.innerHTML = `
      #aqaray-print-area { display: none; }
      @media print {
        body > *:not(#aqaray-print-area) { display: none !important; }
        #aqaray-print-area { display: block !important; position: absolute; inset: 0; }
        #aqaray-print-area .page { position: relative; width: 100%; }
        #aqaray-print-area img { width: 100%; display: block; }
        #aqaray-print-area h1{font-size:20px;margin-bottom:4px;}
        #aqaray-print-area h2{font-size:15px;color:#555;margin-top:0;font-weight:normal}
        #aqaray-print-area table{width:100%;border-collapse:collapse;margin-top:16px}
        #aqaray-print-area th,#aqaray-print-area td{border:1px solid #ddd;padding:8px 10px;font-size:13px;text-align:start}
        #aqaray-print-area .meta{margin-top:6px;font-size:13px;color:#444}
        #aqaray-print-area .total{font-weight:bold;font-size:15px;margin-top:14px}
      }
    `;
    document.head.appendChild(style);
  }
  return el;
}
function printHtml(title, bodyHtml, theme) {
  const area = ensurePrintArea();
  area.innerHTML = `<div style="font-family:Tahoma,Arial,sans-serif;color:#222;padding:16px;">
    <div style="font-size:11px;color:#999;margin-bottom:8px;">${title}</div>
    ${bodyHtml.replace(/<th>/g, `<th style="background:${theme.primarySoft};color:${theme.primaryDark};">`)}
  </div>`;
  setTimeout(() => window.print(), 80);
}
